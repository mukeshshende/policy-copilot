apiVersion: v1
kind: Service
metadata:
  name: policy-copilot
  namespace: policy-copilot
  labels:
    app: policy-copilot
spec:
  type: NodePort
  selector:
    app: policy-copilot
  ports:
    - name: gradio
      protocol: TCP
      port: 7860         # ClusterIP port
      targetPort: 7860   # container port
      nodePort: 30786    # external — access at http://192.168.1.32:30786
